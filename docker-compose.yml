services:
  alchemy:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - alchemy-data:/app/server/data
    environment:
      PORT: 3000
      DB_PATH: /app/server/data/alchemy.json
      EDITOR_PATH: /app/server/data/editor.json
      ROOM_TTL_DAYS: 7

volumes:
  alchemy-data:
